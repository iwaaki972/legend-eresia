<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ma Base de Données</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #333;
      min-height: 100vh;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      color: #2c3e50;
      margin-bottom: 30px;
    }

    h1 span { color: #3498db; }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* FORMULAIRE */
    .card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }

    .card h2 {
      font-size: 1.1rem;
      color: #2c3e50;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f4f8;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
    }

    .form-group input {
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #3498db;
    }

    .btn-add {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-add:hover { background: #2980b9; }
    .btn-add:active { transform: scale(0.98); }

    /* BARRE DE RECHERCHE */
    .search-bar {
      width: 100%;
      padding: 11px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 20px;
      transition: border 0.2s;
    }

    .search-bar:focus { border-color: #3498db; }

    /* COMPTEUR */
    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .stats span {
      font-size: 0.9rem;
      color: #777;
    }

    .btn-clear-all {
      padding: 7px 14px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-clear-all:hover { background: #c0392b; }

    /* TABLE */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #e8e8e8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    thead {
      background: #2c3e50;
      color: white;
    }

    th {
      padding: 12px 15px;
      text-align: left;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    tbody tr:hover { background: #f8fbff; }

    td {
      padding: 12px 15px;
      font-size: 0.92rem;
    }

    .id-badge {
      background: #eaf3fb;
      color: #3498db;
      padding: 3px 8px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .btn-delete {
      background: none;
      border: 1px solid #e74c3c;
      color: #e74c3c;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover {
      background: #e74c3c;
      color: white;
    }

    /* VIDE */
    .empty {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-size: 0.95rem;
    }

    .empty span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

    /* NOTIFICATION */
    .notif {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #2ecc71;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .notif.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 500px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Ma <span>Base de Données</span></h1>

    <!-- FORMULAIRE AJOUT -->
    <div class="card">
      <h2>➕ Ajouter un utilisateur</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="nom">Nom</label>
          <input type="text" id="nom" placeholder="Ex: Alice" />
        </div>
        <div class="form-group">
          <label for="prenom">Prénom</label>
          <input type="text" id="prenom" placeholder="Ex: Dupont" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="alice@mail.com" />
        </div>
        <div class="form-group">
          <label for="age">Âge</label>
          <input type="number" id="age" placeholder="Ex: 25" min="1" max="120" />
        </div>
      </div>
      <button class="btn-add" onclick="ajouterUtilisateur()">Ajouter dans la base</button>
    </div>

    <!-- LISTE -->
    <div class="card">
      <h2>📋 Tous les utilisateurs</h2>
      <input type="text" class="search-bar" id="recherche" placeholder="🔍 Rechercher par nom, email..." oninput="afficherDonnees()" />

      <div class="stats">
        <span id="compteur">0 entrée(s)</span>
        <button class="btn-clear-all" onclick="toutSupprimer()">🗑 Tout supprimer</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nom</th>
              <th>Prénom</th>
              <th>Email</th>
              <th>Âge</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableau"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="notif" id="notif"></div>

  <script>
    // ─── BASE DE DONNÉES (localStorage) ───────────────────────────────────────

    // Charger toutes les données depuis le localStorage
    function chargerDonnees() {
      const data = localStorage.getItem('utilisateurs');
      return data ? JSON.parse(data) : [];
    }

    // Sauvegarder les données dans le localStorage
    function sauvegarderDonnees(data) {
      localStorage.setItem('utilisateurs', JSON.stringify(data));
    }

    // Générer un ID unique
    function genererID() {
      const data = chargerDonnees();
      return data.length > 0 ? Math.max(...data.map(u => u.id)) + 1 : 1;
    }

    // ─── AJOUTER ─────────────────────────────────────────────────────────────

    function ajouterUtilisateur() {
      const nom    = document.getElementById('nom').value.trim();
      const prenom = document.getElementById('prenom').value.trim();
      const email  = document.getElementById('email').value.trim();
      const age    = document.getElementById('age').value.trim();

      if (!nom || !prenom || !email) {
        notification('⚠️ Remplissez nom, prénom et email !', '#e67e22');
        return;
      }

      const data = chargerDonnees();

      // Créer l'enregistrement (comme une ligne dans une table SQL)
      const nouvelUtilisateur = {
        id:     genererID(),
        nom:    nom,
        prenom: prenom,
        email:  email,
        age:    age || '—',
        date:   new Date().toLocaleDateString('fr-FR')
      };

      data.push(nouvelUtilisateur);
      sauvegarderDonnees(data);

      // Vider le formulaire
      ['nom','prenom','email','age'].forEach(id => document.getElementById(id).value = '');

      afficherDonnees();
      notification('✅ Utilisateur ajouté !');
    }

    // ─── SUPPRIMER ───────────────────────────────────────────────────────────

    function supprimerUtilisateur(id) {
      let data = chargerDonnees();
      data = data.filter(u => u.id !== id);
      sauvegarderDonnees(data);
      afficherDonnees();
      notification('🗑 Supprimé !', '#e74c3c');
    }

    function toutSupprimer() {
      if (chargerDonnees().length === 0) return;
      if (confirm('Supprimer TOUTES les entrées ?')) {
        localStorage.removeItem('utilisateurs');
        afficherDonnees();
        notification('🗑 Base vidée !', '#e74c3c');
      }
    }

    // ─── AFFICHER / RECHERCHER ───────────────────────────────────────────────

    function afficherDonnees() {
      const recherche = document.getElementById('recherche').value.toLowerCase();
      let data = chargerDonnees();

      // Filtrer selon la recherche
      if (recherche) {
        data = data.filter(u =>
          u.nom.toLowerCase().includes(recherche)    ||
          u.prenom.toLowerCase().includes(recherche) ||
          u.email.toLowerCase().includes(recherche)
        );
      }

      const tbody = document.getElementById('tableau');
      document.getElementById('compteur').textContent = `${data.length} entrée(s)`;

      if (data.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6">
              <div class="empty">
                <span>📭</span>
                Aucun utilisateur trouvé
              </div>
            </td>
          </tr>`;
        return;
      }

      tbody.innerHTML = data.map(u => `
        <tr>
          <td><span class="id-badge">#${u.id}</span></td>
          <td><strong>${u.nom}</strong></td>
          <td>${u.prenom}</td>
          <td>${u.email}</td>
          <td>${u.age}</td>
          <td>
            <button class="btn-delete" onclick="supprimerUtilisateur(${u.id})">Supprimer</button>
          </td>
        </tr>
      `).join('');
    }

    // ─── NOTIFICATION ────────────────────────────────────────────────────────

    function notification(message, couleur = '#2ecc71') {
      const notif = document.getElementById('notif');
      notif.textContent = message;
      notif.style.background = couleur;
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 2500);
    }

    // ─── INITIALISATION ──────────────────────────────────────────────────────

    // Appuyer sur Entrée pour ajouter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') ajouterUtilisateur();
    });

    // Afficher au chargement
    afficherDonnees();
  </script>

</body>
</html>
